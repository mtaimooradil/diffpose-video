# DiffPose-Video — Docker Compose
#
# Prerequisites:
#   docker compose build        (first time only)
#
# Environment variables (export or set in .env):
#   VIDEOS_DIR        local path to input videos   (default: ./videos)
#   RESULTS_DIR       local path for .npz outputs  (default: ./results)
#   VIS_DIR           local path for .mp4 outputs  (default: ./visualisations)
#   CONFIGS_DIR       local path for .toml configs (default: ./configs)
#
# Single-video inference:
#   docker compose run infer --input /videos/clip.mp4
#
# Batch inference (whole directory, recursive):
#   docker compose run infer --input /videos/ --recursive --skip_existing
#
# Batch inference via config file:
#   docker compose run infer --config /configs/infer.toml
#
# Single-video render:
#   docker compose run visualise --npz /results/clip.npz --video /videos/clip.mp4 --output /vis/clip_vis.mp4
#
# Batch render:
#   docker compose run visualise --results_dir /results --videos_dir /videos --output_dir /vis
#
# Batch render via config file:
#   docker compose run visualise --config /configs/visualise.toml
#
# Interactive dashboard — open http://localhost:8050:
#   docker compose run --service-ports explore --results_dir /results --videos_dir /videos
#   docker compose run --service-ports explore --config /configs/explore.toml

x-base: &base
  image: diffpose-video:latest
  build: .
  runtime: nvidia
  environment:
    - NVIDIA_VISIBLE_DEVICES=all
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility
  volumes:
    - ${VIDEOS_DIR:-./videos}:/videos
    - ${RESULTS_DIR:-./results}:/results
    - ${VIS_DIR:-./visualisations}:/vis
    - ${CONFIGS_DIR:-./configs}:/configs

services:

  # 3D pose inference
  # Supports single file, multiple files/dirs, and --recursive batch mode.
  infer:
    <<: *base
    entrypoint: ["diffpose-infer", "--output_dir", "/results"]

  # Render side-by-side MP4s
  # Supports single-video and batch (--results_dir / --videos_dir) modes.
  visualise:
    <<: *base
    entrypoint: ["diffpose-visualise", "--output_dir", "/vis"]

  # Interactive Dash dashboard — open http://localhost:8050
  # "Render" buttons inside the dashboard write to /vis.
  explore:
    <<: *base
    entrypoint: ["diffpose-explore", "--port", "8050", "--output_dir", "/vis"]
    ports:
      - "8050:8050"
